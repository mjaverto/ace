name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm to a Trusted-Publishing-capable version
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Publishes via npm Trusted Publishing (OIDC). No long-lived token needed —
      # the workflow's id-token: write permission lets npm CLI mint a short-lived
      # publish token at runtime. Configure the trusted publisher for
      # @mjaverto/ace on npmjs.com (GitHub Actions → mjaverto/ace → release.yml).
      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
